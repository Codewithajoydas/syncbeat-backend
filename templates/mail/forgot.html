<!doctype html>

<html>
  <head>
    <meta charset="UTF-8" />
    <title>SyncBeat OTP</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f4f4; padding: 20px"
    >
      <tr>
        <td align="center">
          <!-- Main Container -->
          <table
            width="500"
            cellpadding="0"
            cellspacing="0"
            style="background: #ffffff; border-radius: 8px; padding: 20px"
          >
            <!-- Header -->
            <tr>
              <td align="center" style="padding-bottom: 20px">
                <h2 style="margin: 0; color: #333">SyncBeat</h2>
                <p style="margin: 5px 0; color: #777">
                  Secure Account Verification
                </p>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td style="color: #333; font-size: 14px">
                <p>Hello,</p>
                <p>
                  You requested to reset your password. Use the OTP below to
                  continue:
                </p>

                <!-- OTP Box -->
                <div style="text-align: center; margin: 20px 0">
                  <span
                    style="
                      display: inline-block;
                      background: #000;
                      color: #fff;
                      padding: 12px 24px;
                      font-size: 22px;
                      letter-spacing: 4px;
                      border-radius: 6px;
                    "
                  >
                    {{OTP}}
                  </span>
                </div>

                <p>This OTP is valid for <strong>5 minutes</strong>.</p>
                <p>If you did not request this, please ignore this email.</p>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                style="
                  padding-top: 20px;
                  font-size: 12px;
                  color: #999;
                  text-align: center;
                "
              >
                <p>© 2026 SyncBeat. All rights reserved.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
